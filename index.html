<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixerBud Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f4f8;
  color: #334155;
  min-height: 100vh;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #f0f4f8; }
::-webkit-scrollbar-thumb { background: #f97316; border-radius: 3px; }

/* ── Login ── */
.login-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0a1929 0%, #1a2940 40%, #f97316 100%);
  position: relative; overflow: hidden;
}
.login-page::before {
  content: ''; position: absolute; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(249,115,22,.15) 0%, transparent 70%);
  top: -200px; right: -200px; border-radius: 50%;
}
.login-page::after {
  content: ''; position: absolute; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(249,115,22,.1) 0%, transparent 70%);
  bottom: -100px; left: -100px; border-radius: 50%;
}
.login-card {
  background: rgba(255,255,255,.97);
  border-radius: 20px; padding: 44px 40px; width: 400px; max-width: 90vw;
  box-shadow: 0 25px 80px rgba(0,0,0,.3);
  position: relative;
}
.login-card .logo { text-align: center; margin-bottom: 12px; }
.login-card .logo img { border: 3px solid #f97316; }
.login-card h1 { font-size: 26px; margin-bottom: 2px; color: #0a1929; text-align: center; }
.login-card p { color: #64748b; font-size: 14px; margin-bottom: 28px; text-align: center; }
.login-card input {
  width: 100%; padding: 14px 16px;
  border: 2px solid #e2e8f0; border-radius: 12px;
  font-size: 15px; margin-bottom: 14px; outline: none;
  transition: border-color .2s, box-shadow .2s;
  background: #fff; color: #0a1929;
}
.login-card input:focus { border-color: #f97316; box-shadow: 0 0 0 4px rgba(249,115,22,.12); }
.login-card input::placeholder { color: #94a3b8; }
.login-card button {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: #fff; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: transform .15s, box-shadow .2s;
  box-shadow: 0 4px 16px rgba(249,115,22,.3);
}
.login-card button:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(249,115,22,.4); }
.login-card button:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.login-card .error { color: #dc2626; font-size: 13px; margin-bottom: 12px; text-align: center; background: #fef2f2; padding: 10px; border-radius: 8px; }

/* ── App layout ── */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 260px; background: linear-gradient(180deg, #0a1929 0%, #0f2341 100%);
  color: #fff; display: flex; flex-direction: column; flex-shrink: 0;
  box-shadow: 2px 0 20px rgba(0,0,0,.08);
  position: sticky; top: 0; height: 100vh;
}
.sidebar .brand {
  padding: 24px 20px;
  border-bottom: 1px solid rgba(249,115,22,.12);
  display: flex; align-items: center; gap: 12px;
}
.sidebar .brand .brand-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.sidebar .brand h2 { font-size: 17px; color: #fff; line-height: 1.2; }
.sidebar .brand small { color: #f97316; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.sidebar nav { flex: 1; padding: 16px 10px; }
.sidebar nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; margin-bottom: 2px;
  color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 500;
  transition: all .15s; cursor: pointer; border: none; background: none;
  width: 100%; text-align: left;
  border-radius: 10px;
}
.sidebar nav a:hover { color: #fff; background: rgba(249,115,22,.1); }
.sidebar nav a.active {
  color: #fff; background: rgba(249,115,22,.15);
  font-weight: 600;
  box-shadow: inset 3px 0 0 #f97316;
}
.sidebar .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(249,115,22,.1); }
.sidebar .sidebar-footer button {
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
  color: #94a3b8; cursor: pointer; font-size: 13px; padding: 10px 14px;
  display: flex; align-items: center; gap: 8px; width: 100%;
  border-radius: 10px; transition: all .15s;
}
.sidebar .sidebar-footer button:hover { background: rgba(249,115,22,.1); color: #f97316; border-color: rgba(249,115,22,.2); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  background: rgba(255,255,255,.85); backdrop-filter: blur(12px);
  padding: 16px 28px; border-bottom: 1px solid #e2e8f0;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar h1 { font-size: 20px; font-weight: 800; color: #0a1929; letter-spacing: -.3px; }
.topbar .user-info { font-size: 13px; color: #64748b; background: #f1f5f9; padding: 6px 14px; border-radius: 20px; }
.content { flex: 1; padding: 28px; overflow-y: auto; }

/* ── Stats Grid ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 28px; }
.stat-card {
  background: #fff; border-radius: 16px; padding: 24px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
  transition: transform .2s, box-shadow .2s;
  position: relative; overflow: hidden;
  border: 1px solid rgba(0,0,0,.04);
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 4px; border-radius: 16px 16px 0 0;
}
.stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,.08); }
.stat-card .stat-icon { font-size: 24px; margin-bottom: 12px; }
.stat-card .stat-value { font-size: 30px; font-weight: 800; letter-spacing: -.5px; }
.stat-card .stat-label { font-size: 13px; color: #64748b; margin-top: 4px; font-weight: 500; }
.stat-card:nth-child(1)::before { background: #3b82f6; }
.stat-card:nth-child(2)::before { background: #22c55e; }
.stat-card:nth-child(3)::before { background: #14b8a6; }
.stat-card:nth-child(4)::before { background: #f97316; }
.stat-card:nth-child(5)::before { background: #3b82f6; }
.stat-card:nth-child(6)::before { background: #22c55e; }
.stat-card:nth-child(7)::before { background: #a855f7; }
.stat-card:nth-child(8)::before { background: #f97316; }

/* ── Content Cards ── */
.card {
  background: #fff; border-radius: 16px; padding: 24px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
  border: 1px solid rgba(0,0,0,.04);
  margin-bottom: 24px;
}
.card h2 {
  font-size: 16px; font-weight: 700; color: #0a1929; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card h2::after {
  content: ''; flex: 1; height: 1px; background: linear-gradient(to right, #e2e8f0, transparent);
}

/* ── Tables ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #f1f5f9; }
th {
  font-weight: 700; color: #64748b; font-size: 11px;
  text-transform: uppercase; letter-spacing: .6px;
  background: #f8fafc; white-space: nowrap;
}
th:first-child { border-radius: 8px 0 0 8px; }
th:last-child { border-radius: 0 8px 8px 0; }
td { color: #334155; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }

/* ── Badges ── */
.badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: capitalize; letter-spacing: .2px; }
.badge-green { background: #dcfce7; color: #166534; }
.badge-blue { background: #dbeafe; color: #1e40af; }
.badge-orange { background: #ffedd5; color: #9a3412; }
.badge-red { background: #fef2f2; color: #991b1b; }
.badge-gray { background: #f1f5f9; color: #475569; }
.badge-purple { background: #f3e8ff; color: #6b21a8; }
.badge-teal { background: #ccfbf1; color: #115e59; }

/* ── Buttons ── */
.btn {
  padding: 9px 18px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { transform: translateY(-1px); }
.btn-sm { padding: 5px 12px; font-size: 11px; border-radius: 8px; }
.btn-success { background: #dcfce7; color: #166534; }
.btn-success:hover { background: #bbf7d0; }
.btn-danger { background: #fef2f2; color: #991b1b; }
.btn-danger:hover { background: #fecaca; }
.btn-primary {
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: #fff; padding: 11px 22px;
  box-shadow: 0 4px 14px rgba(249,115,22,.25);
}
.btn-primary:hover { box-shadow: 0 6px 20px rgba(249,115,22,.35); }
.btn-secondary { background: #f1f5f9; color: #475569; }
.btn-secondary:hover { background: #e2e8f0; }

/* ── Verification progress ── */
.progress-group { display: grid; gap: 12px; margin-top: 8px; }
.progress-item { display: flex; align-items: center; gap: 16px; }
.progress-item .label { width: 100px; font-size: 14px; font-weight: 500; color: #475569; }
.progress-item .bar { flex: 1; height: 20px; background: #f1f5f9; border-radius: 10px; overflow: hidden; position: relative; }
.progress-item .bar-fill { height: 100%; border-radius: 10px; transition: width .5s ease; position: relative; }
.progress-item .bar-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
.progress-item .count { width: 36px; text-align: right; font-weight: 700; font-size: 15px; }

/* ── Form ── */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 11px 14px;
  border: 2px solid #e2e8f0; border-radius: 10px;
  font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s;
  background: #fff; color: #0a1929; font-family: inherit;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  border-color: #f97316; box-shadow: 0 0 0 4px rgba(249,115,22,.1);
}
.form-group input::placeholder, .form-group textarea::placeholder { color: #94a3b8; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: flex; gap: 16px; }
.form-row .form-group { flex: 1; }

/* ── Loading ── */
.loading { display: flex; align-items: center; justify-content: center; padding: 80px; }
.spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #f97316; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px 40px; color: #94a3b8; font-size: 14px; background: #fff; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.5);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: #fff; border-radius: 20px; padding: 36px;
  width: 540px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 25px 80px rgba(0,0,0,.2);
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h2 { font-size: 20px; font-weight: 700; color: #0a1929; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: #fff; padding: 14px 28px; border-radius: 12px;
  font-size: 14px; font-weight: 600;
  box-shadow: 0 8px 32px rgba(249,115,22,.3);
  z-index: 200;
  animation: toastIn .3s ease;
}
@keyframes toastIn {
  from { transform: translateY(20px) scale(.95); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* ── Row actions ── */
.row-actions { display: flex; gap: 6px; align-items: center; }

/* ── Category add area ── */
.add-category { background: #f8fafc; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 2px dashed #e2e8f0; transition: border-color .2s; }
.add-category:focus-within { border-color: #f97316; }
.add-category h2 { color: #0a1929; font-size: 15px; margin-bottom: 16px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { width: 64px; }
  .sidebar .brand h2, .sidebar .brand small, .sidebar nav a span:last-child, .sidebar .sidebar-footer button span:last-child { display: none; }
  .sidebar .brand { padding: 16px; justify-content: center; }
  .sidebar .brand .brand-icon { width: 32px; height: 32px; font-size: 16px; }
  .sidebar nav a { justify-content: center; padding: 12px; }
  .sidebar .sidebar-footer button { justify-content: center; }
  .content { padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .stat-card { padding: 16px; }
  .stat-card .stat-value { font-size: 22px; }
  .form-row { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const SUPABASE_URL = 'https://pbeqwuzjeodzucgstnjg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiZXF3dXpqZW9kenVjZ3N0bmpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjQ0MjYsImV4cCI6MjA5NzQ0MDQyNn0.AJJJRdSrEIS3vk5c2Fteecq4LGzbjFNLnm_6pbrxfeE';

const { createClient } = supabase;
const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = { session: null, route: 'dashboard' };

// ── Routing ──
function navigate(route) {
  state.route = route;
  window.location.hash = route;
  render();
}

window.addEventListener('hashchange', () => {
  state.route = window.location.hash.slice(1) || 'dashboard';
  render();
});

// ── Toast ──
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Auth ──
async function login(email, password) {
  const btn = document.querySelector('.login-card button');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Sign In';
  if (error) { document.querySelector('.login-card .error').textContent = error.message; return; }
  let role = data.user?.user_metadata?.role;
  if (role !== 'admin') {
    const { data: profile } = await _supabase.from('profiles').select('role').eq('id', data.user.id).maybeSingle();
    role = profile?.role;
  }
  if (role !== 'admin') {
    await _supabase.auth.signOut();
    document.querySelector('.login-card .error').textContent = 'Access denied. Admin account required.';
    return;
  }
  state.session = data.session;
  navigate('dashboard');
}

async function logout() {
  await _supabase.auth.signOut();
  state.session = null;
  navigate('login');
}

// ── API helpers ──
async function fetchStats() {
  const [profiles, businesses, jobs, quotes] = await Promise.all([
    _supabase.from('profiles').select('id, role'),
    _supabase.from('business_profiles').select('id, verification_status'),
    _supabase.from('jobs').select('status'),
    _supabase.from('quotes').select('status, total'),
  ]);
  const p = profiles.data || [], b = businesses.data || [], j = jobs.data || [], q = quotes.data || [];
  let customers = 0, bizOwners = 0, techs = 0;
  p.forEach(x => { if (x.role === 'customer') customers++; else if (x.role === 'business') bizOwners++; else if (x.role === 'technician') techs++; });
  const pendingVerifications = b.filter(x => x.verification_status === 'pending').length;
  const verifiedBusinesses = b.filter(x => x.verification_status === 'verified').length;
  const activeJobs = j.filter(x => ['accepted','on_the_way','arrived','in_progress'].includes(x.status)).length;
  const completedJobs = j.filter(x => x.status === 'completed').length;
  let revenue = 0;
  q.forEach(x => { if (x.status === 'accepted') revenue += (x.total || 0); });
  return { customers, bizOwners, techs, totalUsers: p.length, totalBusinesses: b.length, pendingVerifications, verifiedBusinesses, activeJobs, completedJobs, totalJobs: j.length, totalQuotes: q.length, revenue };
}

async function fetchUsers() {
  const { data } = await _supabase.from('profiles').select('*').order('created_at', { ascending: false });
  return data || [];
}

async function fetchBusinesses() {
  const { data } = await _supabase.from('business_profiles').select('*').order('created_at', { ascending: false });
  return data || [];
}

async function fetchJobs() {
  const { data } = await _supabase.from('jobs').select('*, profiles!inner(full_name)').order('created_at', { ascending: false }).limit(100);
  return data || [];
}

async function fetchQuotes() {
  const { data } = await _supabase.from('quotes').select('*, profiles!quotes_customer_id_fkey(full_name)').order('created_at', { ascending: false }).limit(100);
  return data || [];
}

async function fetchInvoices() {
  const { data } = await _supabase.from('invoices').select('*, profiles!inner(full_name)').order('created_at', { ascending: false }).limit(100);
  return data || [];
}

async function fetchCategories() {
  const { data } = await _supabase.from('service_categories').select('*').order('display_name');
  return data || [];
}

// ── Render ──
function render() {
  const app = document.getElementById('app');
  if (!state.session) {
    app.innerHTML = renderLogin();
    return;
  }
  if (state.route === 'login') { state.route = 'dashboard'; window.location.hash = 'dashboard'; }
  app.innerHTML = renderShell();
  document.querySelectorAll('.sidebar nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.route === state.route);
  });
  loadPage(state.route);
}

// ── Login view ──
function renderLogin() {
  return `
    <div class="login-page">
      <div class="login-card">
        <div class="logo">
          <img src="https://pbeqwuzjeodzucgstnjg.supabase.co/storage/v1/object/public/business-media/ChatGPT%20Image%20Jul%2017,%202026,%2010_52_38%20AM.png" alt="FixerBud" style="width:80px;height:80px;border-radius:12px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.1)">
        </div>
        <h1>FixerBud Admin</h1>
        <p>Sign in with your admin account</p>
        <div class="error"></div>
        <input type="email" id="email" placeholder="Email address" autocomplete="email">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <button onclick="login(document.getElementById('email').value, document.getElementById('password').value)">Sign In</button>
      </div>
    </div>
  `;
}

// ── Shell ──
function renderShell() {
  const user = state.session?.user;
  const routes = [
    { route: 'dashboard', icon: '📊', label: 'Dashboard' },
    { route: 'users', icon: '👥', label: 'Users' },
    { route: 'businesses', icon: '🏢', label: 'Businesses' },
    { route: 'jobs', icon: '🔧', label: 'Jobs' },
    { route: 'quotes', icon: '📄', label: 'Quotes' },
    { route: 'invoices', icon: '💰', label: 'Invoices' },
    { route: 'categories', icon: '📂', label: 'Categories' },
  ];
  return `
    <div class="app">
      <div class="sidebar">
        <div class="brand">
          <div class="brand-icon">🔧</div>
          <div><h2>FixerBud</h2><small>Admin Panel</small></div>
        </div>
        <nav>
          ${routes.map(r => `<a data-route="${r.route}" href="#${r.route}"><span>${r.icon}</span><span>${r.label}</span></a>`).join('')}
        </nav>
        <div class="sidebar-footer">
          <button onclick="logout()"><span>🚪</span><span>Sign Out — ${user?.email || ''}</span></button>
        </div>
      </div>
      <div class="main">
        <div class="topbar">
          <h1 id="page-title">Dashboard</h1>
          <div class="user-info">${user?.email || ''}</div>
        </div>
        <div class="content" id="page-content"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>
  `;
}

// ── Page loader ──
function loadPage(route) {
  const titles = { dashboard: 'Dashboard', users: 'Users', businesses: 'Businesses', jobs: 'Jobs', quotes: 'Quotes', invoices: 'Invoices', categories: 'Categories' };
  document.getElementById('page-title').textContent = titles[route] || 'Dashboard';
  const content = document.getElementById('page-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  switch (route) {
    case 'dashboard': loadDashboard(content); break;
    case 'users': loadUsers(content); break;
    case 'businesses': loadBusinesses(content); break;
    case 'jobs': loadJobs(content); break;
    case 'quotes': loadQuotes(content); break;
    case 'invoices': loadInvoices(content); break;
    case 'categories': loadCategories(content); break;
    default: content.innerHTML = '<div class="empty">Page not found</div>';
  }
}

// ── Businesses ──
async function loadBusinesses(el) {
  try {
    const bizs = await fetchBusinesses();
    if (!bizs.length) { el.innerHTML = '<div class="empty">No businesses found</div>'; return; }
    el.innerHTML = `<div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Logo</th><th>Name</th><th>Phone</th><th>Suburb</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
      <tbody>${bizs.map(b => {
        const status = b.verification_status || 'unverified';
        const badgeClass = status === 'verified' ? 'badge-green' : status === 'pending' ? 'badge-orange' : 'badge-gray';
        const logoUrl = b.logo_url || (b.logo_path ? publicUrl(b.logo_path) : null);
        const actions = `
          <div class="row-actions">
            <button class="btn btn-sm btn-primary" onclick="editBiz('${b.id}')">✎ Edit</button>
            ${status === 'pending' ? `
              <button class="btn btn-sm btn-success" onclick="verifyBiz('${b.id}','verified')">✓</button>
              <button class="btn btn-sm btn-danger" onclick="verifyBiz('${b.id}','rejected')">✗</button>
            ` : ''}
          </div>`;
        return `<tr>
          <td>${logoUrl ? `<img src="${esc(logoUrl)}" style="width:36px;height:36px;border-radius:6px;object-fit:cover">` : '<span style="color:#ccc">—</span>'}</td>
          <td><strong>${esc(b.business_name || '—')}</strong></td>
          <td>${esc(b.business_phone || '—')}</td>
          <td>${esc(b.suburb || '—')}</td>
          <td><span class="badge ${badgeClass}">${status}</span></td>
          <td>${fmtDate(b.created_at)}</td>

      }).join('')}</tbody>
    </table></div></div>`;
  } catch (e) { el.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

window.verifyBiz = async function(id, status) {
  await _supabase.from('business_profiles').update({ verification_status: status }).eq('id', id);
  toast(`Business ${status === 'verified' ? 'approved' : 'rejected'}`);
  loadPage('businesses');
};

// ── Edit Business Modal ──
let _editingBiz = null;

async function editBiz(id) {
  const { data } = await _supabase.from('business_profiles').select('*').eq('id', id).single();
  _editingBiz = data;
  _editingBiz.logo_preview = data.logo_url || (data.logo_path ? publicUrl(data.logo_path) : null);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'biz-modal';
  overlay.innerHTML = `
    <div class="modal">
      <h2>Edit Business</h2>
      <div style="display:flex;gap:16px;margin-bottom:16px;align-items:center">
        <div id="logo-preview" style="width:80px;height:80px;border-radius:12px;border:2px dashed #ddd;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#f9f9f9;flex-shrink:0">
          ${data.logo_preview ? `<img src="${esc(data.logo_preview)}" style="width:100%;height:100%;object-fit:cover">` : '<span style="color:#ccc;font-size:11px">No logo</span>'}
        </div>
        <div style="flex:1">
          <label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px">Upload New Logo</label>
          <input type="file" id="logo-file" accept="image/*" style="font-size:13px">
        </div>
      </div>
      <div class="form-group"><label>Logo URL (or paste a URL)</label><input id="biz-logo-url" value="${esc(data.logo_url || '')}" placeholder="https://..."></div>
      <div class="form-row">
        <div class="form-group"><label>Business Name</label><input id="biz-name" value="${esc(data.business_name || '')}"></div>
        <div class="form-group"><label>Phone</label><input id="biz-phone" value="${esc(data.business_phone || '')}"></div>
      </div>
      <div class="form-group"><label>Suburb</label><input id="biz-suburb" value="${esc(data.suburb || '')}"></div>
      <div class="form-group"><label>Description</label><textarea id="biz-desc" rows="2">${esc(data.description || '')}</textarea></div>
      <div class="modal-actions">
        <button class="btn" style="background:#e0e0e0;color:#333" onclick="closeBizModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveBiz()">Save Changes</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Preview uploaded logo
  document.getElementById('logo-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('logo-preview').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;
      _editingBiz._logoFile = file;
    };
    reader.readAsDataURL(file);
  });

  // Update preview when URL changes
  document.getElementById('biz-logo-url').addEventListener('input', (e) => {
    if (e.target.value && !_editingBiz._logoFile) {
      document.getElementById('logo-preview').innerHTML = `<img src="${esc(e.target.value)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='<span style=color:#ccc;font-size:11px>Invalid URL</span>'">`;
    }
  });
}

function closeBizModal() {
  const m = document.getElementById('biz-modal');
  if (m) m.remove();
  _editingBiz = null;
}

async function saveBiz() {
  if (!_editingBiz) return;
  const btn = document.querySelector('#biz-modal .btn-primary');
  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    const id = _editingBiz.id;
    const name = document.getElementById('biz-name').value.trim();
    const phone = document.getElementById('biz-phone').value.trim();
    const suburb = document.getElementById('biz-suburb').value.trim();
    const desc = document.getElementById('biz-desc').value.trim();
    let logoUrl = document.getElementById('biz-logo-url').value.trim();

    // If a new file was selected, upload it
    if (_editingBiz._logoFile) {
      const ext = _editingBiz._logoFile.name.split('.').pop();
      const path = `${id}/${Date.now()}.${ext}`;
      const { error: uploadErr } = await _supabase.storage.from('business-media').upload(path, _editingBiz._logoFile);
      if (uploadErr) { toast('Upload failed: ' + uploadErr.message); btn.disabled = false; btn.textContent = 'Save Changes'; return; }
      logoUrl = publicUrl(path);
    }

    const updates = { business_name: name, business_phone: phone, suburb, description: desc, logo_url: logoUrl || null };
    await _supabase.from('business_profiles').update(updates).eq('id', id);
    toast('Business updated');
    closeBizModal();
    loadPage('businesses');
  } catch (e) {
    toast('Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
}

// ── Categories ──
async function loadCategories(el) {
  try {
    const cats = await fetchCategories();
    el.innerHTML = `
      <div class="add-category">
        <h2>➕ Add New Category</h2>
        <div class="form-row">
          <div class="form-group"><label>Slug (e.g. plumbing)</label><input id="cat-name" placeholder="plumbing"></div>
          <div class="form-group"><label>Display Name</label><input id="cat-display" placeholder="Plumbing"></div>
        </div>

      </div>
      <div class="card">

        ${cats.length ? `<div class="table-wrap"><table>
          <thead><tr><th>Name</th><th>Display Name</th><th>Description</th><th>Actions</th></tr></thead>
          <tbody>${cats.map(c => `<tr>
            <td>${esc(c.name)}</td>
            <td><strong>${esc(c.display_name)}</strong></td>
            <td>${esc(c.description || '')}</td>
            <td><button class="btn btn-sm btn-danger" onclick="deleteCategory('${c.id}','${esc(c.display_name)}')">Delete</button></td>
          </tr>`).join('')}</tbody>
        </table></div>` : '<div class="empty">No categories yet</div>'}
      </div>
    `;

window.addCategory = async function() {
  const name = document.getElementById('cat-name').value.trim();
  const display = document.getElementById('cat-display').value.trim();
  const desc = document.getElementById('cat-desc').value.trim();
  if (!name || !display) { toast('Slug and display name are required'); return; }
  await _supabase.from('service_categories').insert({ name, display_name: display, description: desc });
  document.getElementById('cat-name').value = '';
  document.getElementById('cat-display').value = '';
  document.getElementById('cat-desc').value = '';
  toast('Category added');
  render();
};

window.deleteCategory = async function(id, name) {
  if (!confirm(`Delete "${name}"?`)) return;
  await _supabase.from('service_categories').delete().eq('id', id);
  toast('Category deleted');
  render();
};

// ── Helpers ──
function publicUrl(path) {
  return `${SUPABASE_URL}/storage/v1/object/public/business-media/${path}`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-ZA', { day: '2-digit', month: 'short', year: 'numeric' }); }
  catch(_) { return iso; }
}

function statusBadge(s) {
  const map = {
    pending: 'badge-orange', accepted: 'badge-blue', on_the_way: 'badge-blue',
    arrived: 'badge-teal', in_progress: 'badge-purple', completed: 'badge-green',
    cancelled: 'badge-red', draft: 'badge-gray', sent: 'badge-blue',
    paid: 'badge-green', issued: 'badge-blue',
  };
  return map[s] || 'badge-gray';
}

// ── Init ──
(async () => {
  try {
    const { data: { session } } = await _supabase.auth.getSession();
    state.session = session;
    if (state.session) {
      let role = state.session.user?.user_metadata?.role;
      if (role !== 'admin') {
        const { data: profile } = await _supabase.from('profiles').select('role').eq('id', state.session.user.id).maybeSingle();
        role = profile?.role;
      }
      if (role !== 'admin') { await _supabase.auth.signOut(); state.session = null; }
    }
    state.route = window.location.hash.slice(1) || (state.session ? 'dashboard' : 'login');
    render();
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:inherit;background:#f0f4f8">
        <div style="background:#fff;padding:40px;border-radius:16px;max-width:500px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)">
          <div style="font-size:48px;margin-bottom:16px">⚠️</div>
          <h2 style="color:#dc2626;margin-bottom:12px;font-size:20px">Failed to load</h2>
          <p style="color:#64748b;font-size:14px;margin-bottom:8px">${e.message || e}</p>
          <p style="color:#94a3b8;font-size:12px">Check browser console (F12) for details.</p>
        </div>
      </div>`;
  }
})();
</script>
